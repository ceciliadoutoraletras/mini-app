<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anti-Revenge — Guardião de Perda Diária</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0B0F14;
    --panel:#121821;
    --panel-2:#0F141B;
    --line:#1F2A37;
    --text:#E6EDF3;
    --muted:#8B97A7;
    --green:#16C784;
    --green-dim:#0E3A2C;
    --yellow:#F5C451;
    --yellow-dim:#3A2F0E;
    --red:#F0506E;
    --red-dim:#3A1019;
    --black:#05080B;
    --accent:#3B82F6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
    min-height:100vh;
  }
  h1,h2,h3,h4{font-family:'Sora',sans-serif;letter-spacing:-0.01em;line-height:1.15}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select{font-family:inherit}
  .wrap{max-width:860px;margin:0 auto;padding:0 18px}

  nav{
    position:sticky;top:0;z-index:50;
    background:rgba(11,15,20,.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px}
  .brand{display:flex;align-items:center;gap:9px;font-family:'Sora';font-weight:700;font-size:15px}
  .brand .dot{width:10px;height:10px;border-radius:3px;background:var(--green);box-shadow:0 0 12px var(--green)}
  .tabs{display:flex;gap:4px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:4px}
  .tab{
    padding:8px 16px;border-radius:9px;background:transparent;color:var(--muted);
    font-weight:600;font-size:13.5px;transition:all .18s;
  }
  .tab.active{background:var(--panel);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.04)}
  .tab:hover:not(.active){color:var(--text)}

  .status-banner{
    border-radius:18px;padding:26px 24px;margin:22px 0;border:1px solid var(--line);
    display:flex;align-items:center;gap:20px;transition:all .35s;
  }
  .status-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;font-family:'Sora';font-weight:800}
  .status-label{font-family:'Sora';font-weight:800;font-size:22px;letter-spacing:0}
  .status-sub{color:var(--muted);font-size:14px;margin-top:3px}

  .st-green{background:linear-gradient(135deg,var(--green-dim),var(--panel));border-color:#1d5a45}
  .st-green .status-icon{background:var(--green);color:#04130d}
  .st-green .status-label{color:var(--green)}
  .st-yellow{background:linear-gradient(135deg,var(--yellow-dim),var(--panel));border-color:#5c4d18}
  .st-yellow .status-icon{background:var(--yellow);color:#1a1402}
  .st-yellow .status-label{color:var(--yellow)}
  .st-red{background:linear-gradient(135deg,var(--red-dim),var(--panel));border-color:#5c1d2a}
  .st-red .status-icon{background:var(--red);color:#1a0509}
  .st-red .status-label{color:var(--red)}
  .st-black{background:linear-gradient(135deg,#000,#0a0e12);border-color:#2b3744}
  .st-black .status-icon{background:#05080b;color:var(--red);border:1px solid var(--red)}
  .st-black .status-label{color:#fff}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px}
  .card .k{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .card .v{font-family:'Sora';font-weight:700;font-size:26px;margin-top:8px;font-variant-numeric:tabular-nums}
  .card .meta{font-size:12px;color:var(--muted);margin-top:4px}
  .pos{color:var(--green)} .neg{color:var(--red)} .neutral{color:var(--text)}

  .bar{height:7px;border-radius:99px;background:var(--panel-2);overflow:hidden;margin-top:11px;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;border-radius:99px;transition:width .4s ease,background .3s}

  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .btn{padding:13px 20px;border-radius:11px;font-weight:700;font-size:14.5px;transition:all .18s;display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-ghost{background:var(--panel);color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:#334150}
  .btn-danger{background:transparent;color:var(--red);border:1px solid #5c1d2a}
  .btn-danger:hover{background:var(--red-dim)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13.5px;font-weight:600;margin-bottom:7px}
  .field .hint{color:var(--muted);font-weight:400;font-size:12.5px}
  .field input{width:100%;padding:13px 14px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-size:15px;transition:border .15s}
  .field input:focus{outline:none;border-color:var(--accent)}
  .req::after{content:" *";color:var(--red)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px}
  .section-title{font-size:21px;font-weight:700;margin-bottom:4px}
  .section-sub{color:var(--muted);font-size:14.5px;margin-bottom:22px}

  .overlay{position:fixed;inset:0;background:rgba(3,5,8,.72);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px;animation:fade .2s}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:26px;max-width:440px;width:100%;animation:pop .25s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}

  .toast{border-radius:13px;padding:15px 17px;margin:16px 0;font-size:14px;font-weight:500;display:flex;gap:12px;align-items:flex-start;border:1px solid}
  .toast b{font-weight:700}
  .toast-yellow{background:var(--yellow-dim);border-color:#5c4d18;color:#f8dd9a}
  .toast-red{background:var(--red-dim);border-color:#5c1d2a;color:#f7a8b8}

  .hrow{display:grid;grid-template-columns:1.1fr 1fr .8fr 1.3fr;gap:12px;align-items:center;padding:15px 16px;border:1px solid var(--line);border-radius:13px;margin-bottom:10px;background:var(--panel)}
  .hrow .date{font-weight:600;font-size:14px}
  .hrow .sub{font-size:12px;color:var(--muted)}
  .pill{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:99px;display:inline-block;text-transform:uppercase;letter-spacing:.04em}
  .pill-green{background:var(--green-dim);color:var(--green)}
  .pill-red{background:var(--red-dim);color:var(--red)}
  .pill-gray{background:#1a232e;color:var(--muted)}

  .trade-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
  .trade-item:last-child{border-bottom:none}

  .block-card{background:linear-gradient(160deg,#0a0e12,#05080b);border:1px solid #2b3744;border-radius:20px;padding:30px 26px;text-align:center}
  .block-card .big{font-family:'Sora';font-weight:800;font-size:30px;color:#fff;margin:14px 0 6px}
  .preserved{font-family:'Sora';font-weight:800;font-size:34px;color:var(--green);margin:8px 0}

  .fade-up{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}
  .fade-up.in{opacity:1;transform:none}

  .empty{text-align:center;color:var(--muted);padding:44px 20px;border:1px dashed var(--line);border-radius:14px}

  footer{border-top:1px solid var(--line);margin-top:50px;padding:26px 0 50px;color:var(--muted);font-size:12.5px;line-height:1.7}

  @media(max-width:680px){
    .grid{grid-template-columns:1fr 1fr;gap:10px}
    .tab{padding:8px 11px;font-size:12.5px}
    .brand span.full{display:none}
    .status-label{font-size:18px}
    .card .v{font-size:22px}
    .hrow{grid-template-columns:1fr 1fr;row-gap:10px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef} = React;

const LS = "antirevenge_v1";
const load = () => { try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}} };
const save = (d) => localStorage.setItem(LS, JSON.stringify(d));
const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);

const fmtBRL = (n) => {
  const v = Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n<0?'-':'')+'R$ '+v;
};
const todayISO = () => new Date().toISOString().slice(0,10);
const nowHM = () => new Date().toTimeString().slice(0,5);

function weekKey(iso){
  const d = new Date(iso+'T00:00:00');
  const day = (d.getDay()+6)%7;
  const monday = new Date(d); monday.setDate(d.getDate()-day);
  return monday.toISOString().slice(0,10);
}
function fmtDate(iso){
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',weekday:'short'});
}

function computeDay(trades, settings, dayClosed){
  const today = todayISO();
  const tw = weekKey(today);
  const dayTrades = trades.filter(t=>t.date===today);
  const weekTrades = trades.filter(t=>weekKey(t.date)===tw);

  const dayResult = dayTrades.reduce((a,t)=>a+t.amount,0);
  const weekResult = weekTrades.reduce((a,t)=>a+t.amount,0);

  const sorted = [...dayTrades].sort((a,b)=>(a.time+a.seq).localeCompare(b.time+b.seq));
  let stops=0;
  for(let i=sorted.length-1;i>=0;i--){
    if(sorted[i].amount<0) stops++; else break;
  }

  const dLim = Number(settings.daily_loss_limit)||0;
  const wLim = Number(settings.weekly_loss_limit)||0;
  const maxStops = Number(settings.max_consecutive_stops)||0;

  const dailyLoss = Math.abs(Math.min(dayResult,0));
  const weeklyLoss = Math.abs(Math.min(weekResult,0));
  const dailyRemaining = Math.max(dLim - dailyLoss,0);
  const weeklyRemaining = Math.max(wLim - weeklyLoss,0);

  let status='active', reason=null;
  if(dayClosed){ status='closed_manual'; reason='manual'; }
  else if(dLim>0 && dailyLoss>=dLim){ status='blocked'; reason='daily_limit'; }
  else if(wLim>0 && weeklyLoss>=wLim){ status='blocked'; reason='weekly_limit'; }
  else if(maxStops>0 && stops>=maxStops){ status='blocked'; reason='max_stops'; }
  else if(dLim>0 && dailyLoss>=dLim*0.95){ status='red'; }
  else if(dLim>0 && dailyLoss>=dLim*0.8){ status='warning'; }

  return {today,dayTrades,dayResult,weekResult,stops,maxStops,
    dLim,wLim,dailyLoss,weeklyLoss,dailyRemaining,weeklyRemaining,status,reason,
    tradesCount:dayTrades.length};
}

const STATUS_UI = {
  active:{cls:'st-green',icon:'✓',label:'Dentro do plano',sub:'Continue operando com cérebro, não com ego.'},
  warning:{cls:'st-yellow',icon:'!',label:'Atenção',sub:'Você já está perto do seu limite. Mais um erro e o dia acaba.'},
  red:{cls:'st-red',icon:'▲',label:'Pare agora',sub:'Você está a um passo de transformar um dia ruim em um desastre.'},
  blocked:{cls:'st-black',icon:'✕',label:'Encerrado por risco',sub:''},
  closed_manual:{cls:'st-black',icon:'■',label:'Dia encerrado',sub:'Você fechou o pregão manualmente. Bom controle.'},
};
const REASON_TXT = {
  daily_limit:'Seu limite diário foi atingido. Hoje acabou.',
  weekly_limit:'Semana encerrada por risco. Agora é proteger a conta, não alimentar vaidade.',
  max_stops:'Você bateu o máximo de stops seguidos. Seu plano mandava parar. Obedece.',
  manual:'Você encerrou o dia por conta própria.',
};

function useReveal(){
  const ref=useRef(null);
  useEffect(()=>{
    const els=ref.current?ref.current.querySelectorAll('.fade-up'):[];
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{threshold:.12});
    els.forEach((el,i)=>{el.style.transitionDelay=(i*55)+'ms';io.observe(el)});
    return ()=>io.disconnect();
  });
  return ref;
}

function App(){
  const data = load();
  const [settings,setSettings] = useState(data.settings||null);
  const [trades,setTrades] = useState(data.trades||[]);
  const [closedDays,setClosedDays] = useState(data.closedDays||[]);
  const [tab,setTab] = useState(settings?'hoje':'plano');
  const [showTrade,setShowTrade] = useState(false);

  useEffect(()=>{ save({settings,trades,closedDays}); },[settings,trades,closedDays]);

  const dayClosed = closedDays.some(d=>d.date===todayISO());
  const calc = settings ? computeDay(trades,settings,dayClosed) : null;
  const isBlocked = calc && (calc.status==='blocked'||calc.status==='closed_manual');

  const addTrade = (t)=>{
    setTrades(prev=>[...prev,{...t,id:uid(),date:todayISO(),time:nowHM(),seq:String(prev.length).padStart(4,'0')}]);
    setShowTrade(false);
  };
  const closeDayManual = ()=>{
    if(closedDays.some(d=>d.date===todayISO()))return;
    setClosedDays(prev=>[...prev,{date:todayISO(),manual:true}]);
  };

  const effTab = settings ? tab : 'plano';

  return (
    <div>
      <Nav tab={effTab} setTab={setTab} status={calc?calc.status:'active'} hasSettings={!!settings}/>
      <div className="wrap">
        {effTab==='hoje' && settings &&
          <Today calc={calc} settings={settings}
            onAdd={()=>setShowTrade(true)} onClose={closeDayManual} goPlan={()=>setTab('plano')} goHist={()=>setTab('historico')}/>}
        {effTab==='historico' && <History trades={trades} settings={settings} closedDays={closedDays}/>}
        {effTab==='plano' && <Plan settings={settings} onSave={(s)=>{setSettings(s);setTab('hoje')}}/>}
        <Footer/>
      </div>
      {showTrade && <TradeModal onAdd={addTrade} onClose={()=>setShowTrade(false)}/>}
    </div>
  );
}

function Nav({tab,setTab,status,hasSettings}){
  const dotColor = status==='blocked'||status==='closed_manual'||status==='red'?'#F0506E':status==='warning'?'#F5C451':'#16C784';
  return (
    <nav>
      <div className="wrap nav-inner">
        <div className="brand">
          <span className="dot" style={{background:dotColor,boxShadow:'0 0 12px '+dotColor}}></span>
          <span>Anti-Revenge <span className="full" style={{color:'var(--muted)',fontWeight:500}}>· Guardião de Perda</span></span>
        </div>
        <div className="tabs">
          {[['hoje','Hoje'],['historico','Histórico'],['plano','Plano']].map(([k,l])=>(
            <button key={k} className={"tab"+(tab===k?' active':'')} disabled={!hasSettings&&k!=='plano'} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
      </div>
    </nav>
  );
}

function Today({calc,settings,onAdd,onClose,goPlan,goHist}){
  const ref=useReveal();
  const ui=STATUS_UI[calc.status];
  const blocked = calc.status==='blocked'||calc.status==='closed_manual';
  const preserved = settings.account_balance? Number(settings.account_balance)+calc.dayResult : null;
  const dPct = calc.dLim>0? Math.min(calc.dailyLoss/calc.dLim*100,100):0;
  const wPct = calc.wLim>0? Math.min(calc.weeklyLoss/calc.wLim*100,100):0;
  const barColor = (p)=> p>=100?'var(--red)':p>=80?'var(--yellow)':'var(--green)';

  return (
    <div ref={ref}>
      <div className={"status-banner fade-up "+ui.cls} style={{marginTop:24}}>
        <div className="status-icon">{ui.icon}</div>
        <div>
          <div className="status-label">{ui.label}</div>
          <div className="status-sub">{calc.status==='blocked'?REASON_TXT[calc.reason]:ui.sub}</div>
        </div>
      </div>

      {calc.status==='warning' &&
        <div className="toast toast-yellow fade-up">⚠️<div><b>Atenção:</b> você já consumiu {Math.round(dPct)}% do seu limite diário. Mais um erro e o dia acaba.</div></div>}
      {calc.status==='red' &&
        <div className="toast toast-red fade-up">🛑<div><b>Pare agora.</b> Você está colado no limite. A próxima operação ruim encerra seu dia.</div></div>}

      {blocked &&
        <div className="block-card fade-up">
          <div style={{fontSize:13,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:700}}>
            {calc.status==='closed_manual'?'Dia encerrado manualmente':'Pregão travado'}
          </div>
          <div className="big">{calc.status==='closed_manual'?'Você fechou o dia':'Encerrado por risco'}</div>
          <div style={{color:'var(--muted)',fontSize:14.5,maxWidth:380,margin:'0 auto'}}>{REASON_TXT[calc.reason]}</div>
          <div style={{display:'flex',justifyContent:'center',gap:30,margin:'22px 0 6px',flexWrap:'wrap'}}>
            <div><div style={{fontSize:12,color:'var(--muted)'}}>Resultado do dia</div>
              <div style={{fontFamily:'Sora',fontWeight:700,fontSize:22,color:calc.dayResult<0?'var(--red)':'var(--green)'}}>{fmtBRL(calc.dayResult)}</div></div>
            {preserved!==null &&
              <div><div style={{fontSize:12,color:'var(--muted)'}}>Saldo preservado</div>
                <div className="preserved" style={{fontSize:22}}>{fmtBRL(preserved)}</div></div>}
          </div>
          <div style={{marginTop:14,padding:'14px 16px',background:'rgba(22,199,132,.07)',border:'1px solid #1d5a45',borderRadius:12,fontSize:14,color:'#9fe7c9'}}>
            Você não lucrou hoje. Mas impediu sua versão impulsiva de incendiar o resto da conta.
          </div>
        </div>}

      <div className="grid fade-up" style={{marginTop:18}}>
        <Metric k="Resultado do dia" v={fmtBRL(calc.dayResult)} cls={calc.dayResult>0?'pos':calc.dayResult<0?'neg':'neutral'}/>
        <Metric k="Resultado da semana" v={fmtBRL(calc.weekResult)} cls={calc.weekResult>0?'pos':calc.weekResult<0?'neg':'neutral'}/>
        <Metric k="Stops seguidos" v={calc.stops+(calc.maxStops?' / '+calc.maxStops:'')} cls={calc.maxStops&&calc.stops>=calc.maxStops?'neg':calc.stops>0?'neutral':'pos'}/>
        <Metric k="Trades hoje" v={String(calc.tradesCount)+(settings.max_trades_per_day?' / '+settings.max_trades_per_day:'')} cls="neutral"/>
        <div className="card">
          <div className="k">Limite diário restante</div>
          <div className={"v "+(calc.dailyRemaining<=0?'neg':'neutral')}>{fmtBRL(calc.dailyRemaining)}</div>
          <div className="bar"><i style={{width:dPct+'%',background:barColor(dPct)}}></i></div>
        </div>
        <div className="card">
          <div className="k">Limite semanal restante</div>
          <div className={"v "+(calc.weeklyRemaining<=0?'neg':'neutral')}>{fmtBRL(calc.weeklyRemaining)}</div>
          <div className="bar"><i style={{width:wPct+'%',background:barColor(wPct)}}></i></div>
        </div>
      </div>

      <div className="btn-row fade-up">
        <button className="btn btn-primary" onClick={onAdd} disabled={blocked}>
          {blocked?'Registro bloqueado':'+ Registrar trade'}
        </button>
        <button className="btn btn-ghost" onClick={goHist}>Ver histórico</button>
        <button className="btn btn-ghost" onClick={goPlan}>Editar plano</button>
        {!blocked && <button className="btn btn-danger" onClick={onClose}>Encerrar dia</button>}
      </div>

      {calc.dayTrades.length>0 &&
        <div className="panel fade-up" style={{marginTop:24}}>
          <div className="section-title" style={{fontSize:17}}>Operações de hoje</div>
          <div style={{marginTop:12}}>
            {[...calc.dayTrades].reverse().map(t=>(
              <div className="trade-item" key={t.id}>
                <div>
                  <span style={{fontWeight:600}}>{t.asset||'Trade'}</span>
                  <span style={{color:'var(--muted)',marginLeft:10,fontSize:12.5}}>{t.time}{t.note?' · '+t.note:''}</span>
                </div>
                <span className={t.amount>=0?'pos':'neg'} style={{fontWeight:700,fontVariantNumeric:'tabular-nums'}}>{fmtBRL(t.amount)}</span>
              </div>
            ))}
          </div>
        </div>}
    </div>
  );
}

function Metric({k,v,cls,meta}){
  return <div className="card"><div className="k">{k}</div><div className={"v "+(cls||'')}>{v}</div>{meta&&<div className="meta">{meta}</div>}</div>;
}

function TradeModal({onAdd,onClose}){
  const [amount,setAmount]=useState('');
  const [sign,setSign]=useState('loss');
  const [asset,setAsset]=useState('');
  const [note,setNote]=useState('');
  const val = parseFloat(String(amount).replace(',','.'))||0;
  const signed = sign==='win'? Math.abs(val): -Math.abs(val);
  const valid = val>0;
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="section-title" style={{fontSize:19}}>Registrar operação</div>
        <div className="section-sub" style={{marginBottom:18}}>Lance o resultado da operação que acabou de fechar.</div>

        <div className="field">
          <label className="req">Resultado</label>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <button type="button" className="btn" style={{flex:1,padding:'11px',background:sign==='win'?'var(--green-dim)':'var(--panel-2)',color:sign==='win'?'var(--green)':'var(--muted)',border:'1px solid '+(sign==='win'?'#1d5a45':'var(--line)')}} onClick={()=>setSign('win')}>Win (gain)</button>
            <button type="button" className="btn" style={{flex:1,padding:'11px',background:sign==='loss'?'var(--red-dim)':'var(--panel-2)',color:sign==='loss'?'var(--red)':'var(--muted)',border:'1px solid '+(sign==='loss'?'#5c1d2a':'var(--line)')}} onClick={()=>setSign('loss')}>Loss</button>
          </div>
          <input type="number" inputMode="decimal" placeholder="Valor em R$ (ex: 120)" value={amount} onChange={e=>setAmount(e.target.value)} autoFocus/>
          {valid && <div style={{marginTop:8,fontSize:13,color:'var(--muted)'}}>Lançando: <b className={signed>=0?'pos':'neg'}>{fmtBRL(signed)}</b></div>}
        </div>
        <div className="field"><label>Ativo <span className="hint">(opcional)</span></label>
          <input placeholder="WINFUT, WDOFUT..." value={asset} onChange={e=>setAsset(e.target.value)}/></div>
        <div className="field"><label>Observação <span className="hint">(opcional)</span></label>
          <input placeholder="rompimento falhou..." value={note} onChange={e=>setNote(e.target.value)}/></div>

        <div className="btn-row" style={{marginTop:6}}>
          <button className="btn btn-primary" disabled={!valid} onClick={()=>onAdd({amount:signed,asset:asset.trim(),note:note.trim()})}>Salvar operação</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

function Plan({settings,onSave}){
  const ref=useReveal();
  const [f,setF]=useState(settings||{account_name:'',account_balance:'',daily_loss_limit:'',weekly_loss_limit:'',max_consecutive_stops:'',max_trades_per_day:''});
  const set=(k)=>(e)=>setF({...f,[k]:e.target.value});
  const valid = Number(f.daily_loss_limit)>0 && Number(f.weekly_loss_limit)>0 && Number(f.max_consecutive_stops)>0;
  return (
    <div ref={ref}>
      <div className="panel fade-up" style={{marginTop:24}}>
        <div className="section-title">Defina seu plano de risco</div>
        <div className="section-sub">Decida agora, com a cabeça fria, antes do mercado abrir. Depois o app só faz cumprir.</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div className="field"><label>Nome da conta <span className="hint">(opcional)</span></label>
            <input placeholder="Conta XP" value={f.account_name} onChange={set('account_name')}/></div>
          <div className="field"><label>Saldo da conta <span className="hint">(opcional)</span></label>
            <input type="number" inputMode="decimal" placeholder="5000" value={f.account_balance} onChange={set('account_balance')}/></div>
        </div>
        <div className="field"><label className="req">Perda máxima diária (R$)</label>
          <input type="number" inputMode="decimal" placeholder="300" value={f.daily_loss_limit} onChange={set('daily_loss_limit')}/></div>
        <div className="field"><label className="req">Perda máxima semanal (R$)</label>
          <input type="number" inputMode="decimal" placeholder="800" value={f.weekly_loss_limit} onChange={set('weekly_loss_limit')}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div className="field"><label className="req">Máximo de stops seguidos</label>
            <input type="number" inputMode="numeric" placeholder="3" value={f.max_consecutive_stops} onChange={set('max_consecutive_stops')}/></div>
          <div className="field"><label>Máx. trades por dia <span className="hint">(opcional)</span></label>
            <input type="number" inputMode="numeric" placeholder="5" value={f.max_trades_per_day} onChange={set('max_trades_per_day')}/></div>
        </div>

        {!valid && <div style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Preencha perda diária, perda semanal e máximo de stops para salvar.</div>}
        <button className="btn btn-primary" disabled={!valid}
          onClick={()=>onSave({
            account_name:f.account_name,
            account_balance:f.account_balance?Number(f.account_balance):null,
            daily_loss_limit:Number(f.daily_loss_limit),
            weekly_loss_limit:Number(f.weekly_loss_limit),
            max_consecutive_stops:Number(f.max_consecutive_stops),
            max_trades_per_day:f.max_trades_per_day?Number(f.max_trades_per_day):null,
          })}>Salvar meu plano</button>
      </div>
    </div>
  );
}

function History({trades,settings,closedDays}){
  const ref=useReveal();
  const byDate={};
  trades.forEach(t=>{(byDate[t.date]=byDate[t.date]||[]).push(t)});
  const dates=Object.keys(byDate).sort().reverse();

  const rows = dates.map(date=>{
    const dt=byDate[date];
    const result=dt.reduce((a,t)=>a+t.amount,0);
    const manual=closedDays.some(d=>d.date===date);
    let status='active',reason=null;
    const dLoss=Math.abs(Math.min(result,0));
    if(settings){
      if(dLoss>=settings.daily_loss_limit){status='blocked';reason='daily_limit';}
      else {
        const sorted=[...dt].sort((a,b)=>(a.time+a.seq).localeCompare(b.time+b.seq));
        let stops=0;for(let i=sorted.length-1;i>=0;i--){if(sorted[i].amount<0)stops++;else break;}
        if(settings.max_consecutive_stops&&stops>=settings.max_consecutive_stops){status='blocked';reason='max_stops';}
      }
    }
    if(manual && status!=='blocked'){status='closed_manual';reason='manual';}
    return {date,result,count:dt.length,status,reason};
  });

  const STAT={
    active:{pill:'pill-green',txt:'Dentro do plano'},
    blocked:{pill:'pill-red',txt:'Encerrado por risco'},
    closed_manual:{pill:'pill-gray',txt:'Encerrado manual'},
  };
  const RTXT={daily_limit:'limite diário',weekly_limit:'limite semanal',max_stops:'stops seguidos',manual:'manual'};

  return (
    <div ref={ref}>
      <div className="fade-up" style={{marginTop:24,marginBottom:18}}>
        <div className="section-title">Histórico de pregões</div>
        <div className="section-sub" style={{marginBottom:0}}>Seus padrões ficam visíveis aqui. Repetir bloqueio é repetir erro.</div>
      </div>
      {rows.length===0 && <div className="empty fade-up">Nenhum pregão registrado ainda. Registre seu primeiro trade na aba Hoje.</div>}
      {rows.map(r=>(
        <div className="hrow fade-up" key={r.date}>
          <div><div className="date">{fmtDate(r.date)}</div><div className="sub">{r.date}</div></div>
          <div className={r.result>=0?'pos':'neg'} style={{fontWeight:700,fontFamily:'Sora',fontVariantNumeric:'tabular-nums'}}>{fmtBRL(r.result)}</div>
          <div className="sub">{r.count} {r.count===1?'trade':'trades'}</div>
          <div style={{textAlign:'right'}}>
            <span className={"pill "+STAT[r.status].pill}>{STAT[r.status].txt}</span>
            {r.reason&&r.status==='blocked'&&<div className="sub" style={{marginTop:5}}>motivo: {RTXT[r.reason]}</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

function Footer(){
  return (
    <footer>
      <strong style={{color:'var(--text)',fontFamily:'Sora'}}>Aviso</strong><br/>
      O Anti-Revenge é uma ferramenta de gestão de risco e disciplina operacional. Não é uma plataforma de corretagem, não executa ordens e não tem conexão com sua corretora. Os valores são inseridos manualmente por você e ficam salvos apenas neste navegador. Operar no mercado financeiro envolve risco de perda. Este app não constitui recomendação de investimento, consultoria financeira ou garantia de resultado. As decisões de operar e os limites definidos são de sua inteira responsabilidade.
      <div style={{marginTop:14,opacity:.6}}>Anti-Revenge — Guardião de Perda Diária · dados salvos localmente no seu dispositivo.</div>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
