  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #FDFAF5; color: #1E293B; margin: 0; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #0f766e; border-radius: 3px; }

    .fade-up { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.10s; }
    .fade-up-3 { animation-delay: 0.15s; }
    .fade-up-4 { animation-delay: 0.20s; }
    .fade-up-5 { animation-delay: 0.25s; }

    .card-hover { transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(15,118,110,0.15); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.6);
      backdrop-filter: blur(4px); z-index: 50;
      display: flex; align-items: flex-end; justify-content: center;
    }
    @media(min-width:640px) {
      .modal-overlay { align-items: center; }
    }
    .modal-sheet {
      background: #FDFAF5; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 640px; max-height: 92vh;
      overflow-y: auto; padding: 0;
      animation: slideUp 0.3s ease;
    }
    @media(min-width:640px) {
      .modal-sheet { border-radius: 20px; max-height: 88vh; }
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
      border: 1.5px solid transparent;
    }
    .pill-active { background: #0f766e; color: white; border-color: #0f766e; }
    .pill-inactive { background: white; color: #475569; border-color: #e2e8f0; }
    .pill-inactive:hover { border-color: #0f766e; color: #0f766e; }

    .step-dot {
      width: 24px; height: 24px; min-width: 24px;
      border-radius: 50%; background: #0f766e; color: white;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    .progress-bar-track { background: #e2e8f0; border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-bar-fill { background: #0f766e; height: 100%; border-radius: 99px; transition: width 0.5s ease; }

    .quiz-opt {
      width: 100%; text-align: left; padding: 12px 16px;
      border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 14px; cursor: pointer; transition: all 0.15s ease;
      background: white;
    }
    .quiz-opt:hover:not(:disabled) { border-color: #0f766e; background: #f0fdfa; }
    .quiz-opt-correct { border-color: #16a34a !important; background: #f0fdf4 !important; color: #15803d; }
    .quiz-opt-wrong   { border-color: #dc2626 !important; background: #fef2f2 !important; color: #dc2626; }

    .nav-tab {
      flex: 1; padding: 10px 4px; text-align: center;
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: all 0.15s ease; color: #94a3b8;
    }
    .nav-tab-active { border-color: #0f766e; color: #0f766e; }

    .bar-card {
      position: relative; border-radius: 16px; padding: 20px;
      cursor: pointer; overflow: hidden;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }
    .bar-card:hover { border-color: rgba(255,255,255,0.4); transform: translateY(-2px); }
    .bar-card-inner { position: relative; z-index: 1; }

    input[type=text], input[type=search] { outline: none; }
    input:focus { box-shadow: 0 0 0 3px rgba(15,118,110,0.15); }

    .fav-btn { transition: transform 0.2s ease; }
    .fav-btn:active { transform: scale(1.3); }

    .tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      padding: 2px 8px; border-radius: 99px; text-transform: uppercase;
    }
    .tag-autoral { background: #fef3c7; color: #92400e; }
    .tag-classico { background: #e0e7ff; color: #3730a3; }
    .tag-semAlcool { background: #dcfce7; color: #166534; }
    .tag-frozen { background: #dbeafe; color: #1e40af; }
    .tag-assinatura { background: #fce7f3; color: #9d174d; }
    .tag-tropical { background: #fef9c3; color: #713f12; }
    .tag-aperitivo { background: #ffe4e6; color: #9f1239; }
    .tag-gin { background: #f0fdf4; color: #166534; }
    .tag-default { background: #f1f5f9; color: #475569; }

    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }

const usePersist = (key, initial) => {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = useCallback((v) => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [val, set];
};

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// Quiz
const QuizSection = ({ barDrinks }) => {
  const questions = useMemo(() => {
    if (barDrinks.length < 2) return [];
    const qs = [];
    barDrinks.forEach(drink => {
      const mainIng = drink.ingredients[0];
      const otherAmounts = DRINKS.filter(d => d.id !== drink.id).map(d => d.ingredients[0]?.amount).filter(Boolean);
      const wrongAmounts = shuffle([...new Set(otherAmounts)]).slice(0, 3);
      qs.push({
        drinkId: drink.id, drinkName: drink.name,
        question: `Qual a quantidade de "${mainIng.item}" no ${drink.name}?`,
        correct: mainIng.amount,
        options: shuffle([mainIng.amount, ...wrongAmounts.slice(0,3)]),
      });
      const glassPool = ['Taça balão','Highball','Old fashioned','Flute','Taça martini','Hurricane','Taça coupe'];
      qs.push({
        drinkId: drink.id, drinkName: drink.name,
        question: `Qual o copo indicado para o ${drink.name}?`,
        correct: drink.glass,
        options: shuffle([drink.glass, ...shuffle(glassPool).filter(g => !drink.glass.toLowerCase().startsWith(g.toLowerCase().slice(0,6))).slice(0,3)]),
      });
    });
    return shuffle(qs).slice(0, 10);
  }, [barDrinks]);

  const [qIndex, setQIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [wrongs, setWrongs] = useState([]);

  const handleSelect = (opt) => {
    if (selected !== null) return;
    setSelected(opt);
    if (opt === questions[qIndex].correct) setScore(s => s+1);
    else setWrongs(w => [...w, questions[qIndex].drinkName]);
  };
  const next = () => {
    if (qIndex + 1 >= questions.length) setDone(true);
    else { setQIndex(i => i+1); setSelected(null); }
  };
  const reset = () => { setQIndex(0); setSelected(null); setScore(0); setDone(false); setWrongs([]); };

  if (questions.length === 0) return (
    <div className="text-center py-10 text-slate-400">
      <BookOpen size={28} className="mx-auto mb-2 opacity-40" />
      <p className="text-sm">Adicione mais drinks a este bar para ativar o quiz.</p>
    </div>
  );

  if (done) {
    const pct = Math.round((score / questions.length) * 100);
    return (
      <div className="py-2">
        <div className="text-center mb-5">
          <div className="text-5xl mb-3">{pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚'}</div>
          <h3 className="text-xl font-bold text-slate-800">{score} de {questions.length} corretas</h3>
          <p className="text-slate-500 mt-1">{pct}% de acerto</p>
        </div>
        <div className="progress-bar-track mb-5">
          <div className="progress-bar-fill" style={{ width:`${pct}%` }} />
        </div>
        {wrongs.length > 0 && (
          <div className="bg-red-50 border border-red-100 rounded-xl p-4 mb-4">
            <p className="text-xs font-semibold text-red-600 uppercase tracking-wide mb-2">Revisar</p>
            {[...new Set(wrongs)].map(n => <p key={n} className="text-sm text-red-700">• {n}</p>)}
          </div>
        )}
        <button onClick={reset} className="w-full py-3 bg-teal-600 text-white rounded-xl font-semibold text-sm hover:bg-teal-700 transition-colors">
          Tentar novamente
        </button>
      </div>
    );
  }

  const q = questions[qIndex];
  return (
    <div className="py-2">
      <div className="flex items-center justify-between mb-3">
        <span className="text-xs text-slate-400 font-medium">Pergunta {qIndex+1} de {questions.length}</span>
        <span className="text-xs font-semibold text-teal-600">{score} ✓</span>
      </div>
      <div className="progress-bar-track mb-5">
        <div className="progress-bar-fill" style={{ width:`${(qIndex/questions.length)*100}%` }} />
      </div>
      <div className="bg-slate-50 rounded-xl p-4 mb-5">
        <p className="text-xs text-teal-600 font-semibold mb-1">{q.drinkName}</p>
        <p className="text-slate-800 font-medium text-sm leading-snug">{q.question}</p>
      </div>
      <div className="space-y-2 mb-5">
        {q.options.map((opt, i) => {
          let cls = 'quiz-opt';
          if (selected !== null) {
            if (opt === q.correct) cls += ' quiz-opt-correct';
            else if (opt === selected) cls += ' quiz-opt-wrong';
          }
          return (
            <button key={i} className={cls} onClick={() => handleSelect(opt)} disabled={selected !== null}>
              {opt}
            </button>
          );
        })}
      </div>
      {selected !== null && (
        <button onClick={next} className="w-full py-3 bg-teal-600 text-white rounded-xl font-semibold text-sm hover:bg-teal-700 transition-colors">
          {qIndex+1 >= questions.length ? 'Ver resultado' : 'Próxima'}
        </button>
      )}
    </div>
  );
};

              <div className="mb-8">
                <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">
                  {filteredDrinks.length} resultado{filteredDrinks.length !== 1 ? 's' : ''}
                </p>
                {filteredDrinks.length === 0 ? (
                  <div className="text-center py-12">
                    <Search size={28} className="mx-auto text-slate-300 mb-2" />
                    <p className="text-sm text-slate-400">Nenhum drink encontrado</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {filteredDrinks.map(d => (
                      <DrinkCard key={d.id} drink={d} onOpen={setSelectedDrink} isFav={!!favorites[d.id]} onFav={toggleFav} />
                    ))}
                  </div>
                )}
              </div>
            ) : (
              <>
                {/* Grid de bares */}
                <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3 fade-up fade-up-1">
                  {BARS.length} pontos de venda
                </p>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                  {BARS.map((bar, i) => {
                    const color = BAR_COLORS[bar];
                    const stats = barStats[bar];
                    const studiedPct = stats.total ? (stats.studied / stats.total) : 0;
                    return (
                      <div
                        key={bar}
                        className={`bar-card fade-up fade-up-${Math.min((i%5)+1,5)}`}
                        style={{ background: color.bg }}
                        onClick={() => openBar(bar)}
                      >
                        <div className="bar-card-inner">
                          <div className="text-2xl mb-2">{color.emoji}</div>
                          <h3 className="font-bold text-white text-xs leading-tight mb-2">{bar}</h3>
                          <p className="text-xs text-white/60 mb-2">{stats.total} drink{stats.total !== 1 ? 's' : ''}</p>
                          <div className="h-1.5 rounded-full" style={{ background:'rgba(255,255,255,0.2)' }}>
                            <div className="h-full rounded-full transition-all duration-500" style={{ background:'rgba(255,255,255,0.6)', width:`${studiedPct*100}%` }} />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Favoritos na home */}
                {favDrinks.length > 0 && (
                  <div className="mt-8 fade-up">
                    <div className="flex items-center gap-2 mb-3">
                      <Star size={14} className="text-amber-400" fill="#fbbf24" />
                      <h2 className="text-sm font-bold text-slate-700">Seus Favoritos</h2>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {favDrinks.map(d => (
                        <DrinkCard key={d.id} drink={d} onOpen={setSelectedDrink} isFav={true} onFav={toggleFav} />
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* ── VISÃO DO BAR ──────────────────────────────────────────────────── */}
        {view === 'bar' && selectedBar && (
          <div>
            {/* Banner */}
            <div className="mt-4 rounded-2xl p-5 fade-up" style={{ background: BAR_COLORS[selectedBar].bg }}>
              <div className="text-3xl mb-2">{BAR_COLORS[selectedBar].emoji}</div>
              <h2 className="font-bold text-white text-lg leading-tight">{selectedBar}</h2>
              <p className="text-white/60 text-sm mt-0.5">{barDrinks.length} drinks disponíveis</p>
            </div>

            {/* Tabs */}
            <div className="flex mt-4 bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden fade-up fade-up-1">
              {[
                { key:'catalogo',  label:'Catálogo',  icon:<Wine size={12}/> },
                { key:'favoritos', label:'Favoritos', icon:<Star size={12}/> },
                { key:'treinar',   label:'Quiz',      icon:<BookOpen size={12}/> },
                { key:'progresso', label:'Progresso', icon:<BarChart3 size={12}/> },
              ].map(tab => (
                <button
                  key={tab.key}
                  className={`nav-tab flex items-center justify-center gap-1 ${activeTab === tab.key ? 'nav-tab-active' : ''}`}
                  onClick={() => setActiveTab(tab.key)}
                >
                  {tab.icon}{tab.label}
                </button>
              ))}
            </div>

            {/* TAB: Catálogo */}
            {activeTab === 'catalogo' && (
              <div className="mt-4 fade-up">
                <div className="relative mb-3">
                  <Search size={14} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" />
                  <input
                    type="search"
                    placeholder="Buscar drink ou ingrediente..."
                    className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm text-slate-700 placeholder:text-slate-400 focus:border-teal-400 transition-colors"
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                  />
                </div>
                <div className="flex gap-2 overflow-x-auto pb-2 mb-4 hide-scrollbar">
                  {ALL_CATEGORIES.map(cat => (
                    <button key={cat} className={`pill ${activeFilters.includes(cat) ? 'pill-active' : 'pill-inactive'}`} onClick={() => toggleFilter(cat)}>
                      {cat}
                    </button>
                  ))}
                  {activeFilters.length > 0 && (
                    <button className="pill pill-inactive" style={{ color:'#dc2626', borderColor:'#fecaca' }} onClick={() => setActiveFilters([])}>
                      <X size={10} /> Limpar
                    </button>
                  )}
                </div>
                {filteredDrinks.length === 0 ? (
                  <div className="text-center py-12">
                    <Search size={28} className="mx-auto text-slate-300 mb-2" />
                    <p className="text-sm text-slate-400">Nenhum drink encontrado</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {filteredDrinks.map(d => (
                      <DrinkCard key={d.id} drink={d} onOpen={setSelectedDrink} isFav={!!favorites[d.id]} onFav={toggleFav} />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* TAB: Favoritos */}
            {activeTab === 'favoritos' && (
              <div className="mt-4 fade-up">
                {barDrinks.filter(d => favorites[d.id]).length === 0 ? (
                  <div className="text-center py-12">
                    <Star size={32} className="mx-auto text-slate-200 mb-3" />
                    <p className="text-sm font-medium text-slate-400">Nenhum favorito neste bar</p>
                    <p className="text-xs text-slate-400 mt-1">Toque na ⭐ em qualquer ficha para favoritar.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {barDrinks.filter(d => favorites[d.id]).map(d => (
                      <DrinkCard key={d.id} drink={d} onOpen={setSelectedDrink} isFav={true} onFav={toggleFav} />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* TAB: Quiz */}
            {activeTab === 'treinar' && (
              <div className="mt-4">
                <div className="bg-white border border-slate-100 rounded-2xl p-5">
                  <div className="flex items-center gap-2 mb-1">
                    <BookOpen size={15} className="text-teal-600" />
                    <h3 className="font-bold text-slate-800 text-sm">Quiz de Receitas</h3>
                  </div>
                  <p className="text-xs text-slate-400 mb-4">Teste seu conhecimento sobre os drinks do {selectedBar}.</p>
                  <QuizSection barDrinks={barDrinks} />
                </div>
              </div>
            )}

            {/* TAB: Progresso */}
            {activeTab === 'progresso' && (
              <div className="mt-4">
                <div className="bg-white border border-slate-100 rounded-2xl p-5">
                  <div className="flex items-center gap-2 mb-1">
                    <BarChart3 size={15} className="text-teal-600" />
                    <h3 className="font-bold text-slate-800 text-sm">Checklist de Estudo</h3>
                  </div>
                  <p className="text-xs text-slate-400 mb-4">Marque os drinks que você já estudou. O progresso salva automaticamente.</p>
                  <ProgressSection barDrinks={barDrinks} progress={progress} onToggle={toggleProgress} />
                </div>
              </div>
            )}
          </div>
        )}
      </main>

      {/* Modal */}
      {selectedDrink && (
        <DrinkModal
          drink={selectedDrink}
          onClose={() => setSelectedDrink(null)}
          isFav={!!favorites[selectedDrink.id]}
          onFav={toggleFav}
        />
      )}

      {/* Footer */}
      <footer className="max-w-[860px] mx-auto px-4 py-6 border-t border-slate-100 mt-4">
        <div className="flex items-start gap-2">
          <Info size={12} className="text-slate-300 flex-shrink-0 mt-0.5" />
          <p className="text-xs text-slate-400 leading-relaxed">
            <strong>Costão BarBook</strong> — uso interno. Fichas técnicas de referência operacional.
            Todas as receitas devem ser validadas pela supervisão de A&amp;B antes de se tornarem padrão oficial.
            Conteúdo restrito à equipe do Costão do Santinho.
          </p>
        </div>
      </footer>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
