<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador Acadêmico Semanal</title>
  <link rel="stylesheet" href="tailwind.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #FDFAF5; color: #1E293B; }

<body class="antialiased min-h-screen pb-12">
  <div id="root" class="w-full max-w-[860px] mx-auto px-4 pt-6"></div>

</html>
